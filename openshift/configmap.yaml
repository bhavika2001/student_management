apiVersion: v1
kind: ConfigMap
metadata:
  name: student-management-config
data:
  spring.datasource.url: "jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true"
  spring.jpa.properties.hibernate.dialect: "org.hibernate.dialect.MySQL8Dialect"
  spring.jpa.hibernate.ddl-auto: "update"
  logging.level.org.hibernate.SQL: "DEBUG"
